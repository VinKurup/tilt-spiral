# Production shape: Redis-backed queue (at-least-once, crash recovery),
# SQLite on a volume. RIOT_API_KEY comes from the environment or an .env file
# next to this compose file.
services:
  observatory:
    build: .
    ports:
      - "8080:8080"
    environment:
      RIOT_API_KEY: ${RIOT_API_KEY}
      RIOT_REGION: ${RIOT_REGION:-americas}
      TILT_DB: /data/tilt.db
      QUEUE: redis
      REDIS_ADDR: redis:6379
      WORKERS: "2"
    volumes:
      - ./data:/data
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  redis-data:
